worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    
    # Требование 5: Настройка безопасности - скрываем версию nginx
    server_tokens off;

    # Требование 2: Принудительное перенаправление HTTP -> HTTPS
    server {
        listen 80;
        server_name project1.local project2.local;
        return 301 https://$host$request_uri;
    }

    # Требование 4: Виртуальный хост для первого проекта
    server {
        # Требование 1: Работает по HTTPS
        listen 443 ssl;
        server_name project1.local;

        # Пути к сертификатам
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        location / {
            root /usr/share/nginx/html/project1;
            index index.html;
        }

        # Требование 3: Использование alias
        # Если зайти на /data/secret.txt, nginx отдаст файл из папки shared
        location /data/ {
            alias /usr/share/nginx/html/shared/;
        }
    }

    # Требование 4: Виртуальный хост для второго проекта
    server {
        listen 443 ssl;
        server_name project2.local;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        location / {
            root /usr/share/nginx/html/project2;
            index index.html;
        }
    }
}