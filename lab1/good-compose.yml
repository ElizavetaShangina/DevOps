services:
  web:
    # fix 1: Указана версия образа
    image: nginx:1.25-alpine
    # fix 2: Политика перезапуска
    restart: unless-stopped
    ports:
      - "8080:80"
    # fix 3: Ограничение ресурсов
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    # fix 4: Ожидание готовности базы данных
    depends_on:
      db:
        condition: service_healthy
    # Изоляция: сервис подключен только к фронтенд-сети
    networks:
      - frontend_net

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      # fix 5: Пароль передается через переменные окружения (.env)
      - POSTGRES_PASSWORD=${DB_PASSWORD:-default_secure_pass}
    # fix 6: Убран блок ports. БД доступна только изнутри докера.

    # fix 7: Подключен том для сохранения данных БД
    volumes:
      - db_data:/var/lib/postgresql/data

    # Healthcheck - нужен для правильной работы depends_on у сервиса web
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    # Изоляция: сервис подключен только к бэкенд-сети
    networks:
      - backend_net

# Объявление тома для хранения
volumes:
  db_data:

# Объявление разных сетей для изоляции
networks:
  frontend_net:
  backend_net: